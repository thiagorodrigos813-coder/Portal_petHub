<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PetHub</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: Arial, Helvetica, sans-serif;
}

body{
background:#f4f6f9;
display:flex;
flex-direction:column;
height:100vh;
}

/* Barra superior */

header{
background:#2c7be5;
color:white;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
box-shadow:0 2px 8px rgba(0,0,0,0.15);
}

/* Área do app */

.container{
flex:1;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

/* Janela do app */

.app{
width:100%;
max-width:1200px;
height:85vh;
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

/* iframe */

iframe{
width:100%;
height:100%;
border:none;
}

</style>
</head>

<body>

<header>
🐾 PetHub
</header>

<div class="container">

<div class="app">

<iframe
src="https://www.jotform.com/app/260124630613647?appEmbedded=1"
allow="geolocation; microphone; camera">
</iframe>

</div>

</div>

</body>
</html>
